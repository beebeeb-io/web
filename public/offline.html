<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're offline — Beebeeb</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f9f6f1; color: #1a1814; }
    .card { text-align: center; max-width: 360px; padding: 2rem; }
    .logo { font-weight: 700; font-size: 1.5rem; color: #1a1814; margin-bottom: 1.5rem; }
    .logo span { color: #f5b800; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { color: #6b6560; margin-bottom: 1.5rem; }
    button { background: #f5b800; color: #1a1814; font-weight: 600; border: none; border-radius: 8px; padding: 0.75rem 1.5rem; cursor: pointer; font-size: 1rem; }
    button:hover { background: #e6ac00; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">beebeeb<span>.io</span></div>
    <h1>You're offline</h1>
    <p>Your files are safe — they're encrypted and waiting. Connect to the internet to continue.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
