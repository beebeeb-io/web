server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version from Server: header
    server_tokens off;

    # Gzip — Vite output is compressible
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        font/woff2;

    # Hashed Vite output — cache forever
    location ~* \.(js|css|wasm|woff2|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Apple Universal Links — AASA must be served as application/json
    location = /.well-known/apple-app-site-association {
        add_header Content-Type "application/json";
        try_files $uri =404;
    }

    # Allow .well-known/* (ACME, AASA, etc.) before the dotfiles deny rule
    location ^~ /.well-known/ {
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block other dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }
}
