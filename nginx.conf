server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version from Server: header
    server_tokens off;

    # Security headers — applied to all responses via `always`. Note nginx's
    # add_header inheritance: locations with their own add_header (cache, AASA)
    # do NOT inherit these. The SPA fallback location / has no add_header of
    # its own, so it inherits these — which is where they matter most.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://api.beebeeb.io wss://api.beebeeb.io https://challenges.cloudflare.com; img-src 'self' blob: data:; media-src 'self' blob:; worker-src 'self' blob:; frame-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip — Vite output is compressible
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        font/woff2;

    # Hashed Vite output — cache forever
    location ~* \.(js|css|wasm|woff2|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Apple Universal Links — AASA must be served as application/json
    location = /.well-known/apple-app-site-association {
        add_header Content-Type "application/json";
        try_files $uri =404;
    }

    # Allow .well-known/* (ACME, AASA, etc.) before the dotfiles deny rule
    location ^~ /.well-known/ {
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block other dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }
}
