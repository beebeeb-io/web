name: CI

permissions: {}

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install
      - run: bunx tsc --noEmit
      - run: bun test # unit tests (test/, scoped via bunfig.toml) — 0740b: was never in CI
      - run: bun run build

  # ── Browser-level regression gate (task 0866) ───────────────────────────────
  # Runs the real Playwright suite against a self-bootstrapped full stack:
  # Postgres 17 (service) + a freshly-built debug `beebeeb-api` + Vite, driven by
  # the SAME `e2e/scripts/web-e2e.sh` harness used locally (per-spec isolation —
  # each spec file gets a fresh DB + blob store, so no spec contaminates another).
  #
  # Wiring detail (the one cross-repo bit): the web client has no server in its
  # own checkout, so this job clones `beebeeb-io/server` (+ its `core` path dep)
  # as siblings INSIDE the workspace and builds the API in DEBUG. Debug is
  # mandatory — `/dev/auto-login` (which global.setup.ts authenticates through)
  # is `#[cfg(debug_assertions)]` and absent from release builds. The server's
  # dev Cargo profile optimizes only the Argon2id crates, so the debug build's
  # crypto is release-fast (the dev auto-login derives a 256 MiB Argon2id key on
  # every page load) without slowing the rest of the debug compile.
  e2e:
    name: E2E (Playwright, full stack)
    runs-on: ubuntu-latest
    # informational until e2e test-backend stability under auth load is hardened
    # (task 0869) — promote to required gate after. Still runs + uploads the
    # report artifact on failure, so it gives signal without blocking merges.
    continue-on-error: true
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: beebeeb
          POSTGRES_PASSWORD: beebeeb_dev
          POSTGRES_DB: beebeeb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # web-e2e.sh connects here and CREATEs its own throwaway per-spec DBs.
      E2E_PG_PORT: "5432"
      # Point the harness at the API binary built below (sibling checkout, inside
      # the workspace so Swatinem/rust-cache can cache its target dir).
      E2E_API_BIN: ${{ github.workspace }}/server/target/debug/beebeeb-api
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout web
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Checkout server (provides the debug API binary)
        run: git clone --depth 1 https://github.com/beebeeb-io/server.git server

      - name: Checkout core (server Cargo path dependency — ../core)
        run: git clone --depth 1 https://github.com/beebeeb-io/core.git core

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned action; toolchain set below
        with:
          toolchain: "1.96.0"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: server

      - name: Install system deps (mold linker, psql client, lsof)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq mold postgresql-client lsof

      - name: Build server (debug; Argon2id optimized via server dev profile)
        working-directory: server
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
        run: cargo build -p beebeeb-api

      - name: Install web dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run E2E gate (isolated full-stack harness, per-spec backend)
        run: ./e2e/scripts/web-e2e.sh

      - name: Upload Playwright report + traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore
